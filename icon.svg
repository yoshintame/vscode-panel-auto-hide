<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="#181825"/>

  <!-- Editor area -->
  <rect x="32" y="32" width="192" height="120" rx="12" fill="#313244"/>

  <!-- Code lines in editor -->
  <rect x="48" y="52" width="80" height="6" rx="3" fill="#89b4fa" opacity="0.7"/>
  <rect x="48" y="66" width="120" height="6" rx="3" fill="#cdd6f4" opacity="0.4"/>
  <rect x="48" y="80" width="100" height="6" rx="3" fill="#cdd6f4" opacity="0.4"/>
  <rect x="48" y="94" width="140" height="6" rx="3" fill="#a6e3a1" opacity="0.5"/>
  <rect x="48" y="108" width="90" height="6" rx="3" fill="#cdd6f4" opacity="0.4"/>
  <rect x="48" y="122" width="110" height="6" rx="3" fill="#cdd6f4" opacity="0.4"/>

  <!-- Panel (fading out / hiding) -->
  <rect x="32" y="164" width="192" height="60" rx="12" fill="#45475a" opacity="0.25"/>
  <rect x="48" y="178" width="60" height="5" rx="2.5" fill="#a6adc8" opacity="0.15"/>
  <rect x="48" y="190" width="100" height="5" rx="2.5" fill="#a6adc8" opacity="0.1"/>

  <!-- Down arrow (panel going away) -->
  <line x1="128" y1="176" x2="128" y2="210" stroke="#f38ba8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <polyline points="116,200 128,212 140,200" fill="none" stroke="#f38ba8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
